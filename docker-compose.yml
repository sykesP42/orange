services:
  orange-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orange-frontend
    ports:
      - "8080:80"
    volumes:
      - ./dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - orange-network
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=frontend"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      orange-backend:
        condition: service_healthy

  orange-backend:
    build:
      context: ./server-go
      dockerfile: Dockerfile
    container_name: orange-backend
    ports:
      - "3003:3003"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    environment:
      - ENV=production
      - SERVER_PORT=3003
      - DATABASE_PATH=/app/data/data.db
      - UPLOAD_PATH=/app/uploads
      - CORS_ORIGIN=http://123.56.99.154
      - JWT_SECRET=${JWT_SECRET:-please-change-this-secret-in-production}
      - MAX_UPLOAD_SIZE=10485760
      - REDIS_HOST=orange-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=orange-redis-local-dev
    networks:
      - orange-network
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=backend"
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '1.0'
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      orange-redis:
        condition: service_healthy

  orange-redis:
    image: redis:7-alpine
    container_name: orange-redis
    volumes:
      - redis-data:/data
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru --appendonly yes --bind 0.0.0.0 --protected-mode yes --requirepass ${REDIS_PASSWORD:-orange-redis-local-dev}
    networks:
      - orange-network
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
        labels: "service=redis"
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-orange-redis-local-dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  orange-network:
    driver: bridge

volumes:
  redis-data:
